<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Background gradient - subtle warmth -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5F2ED"/>
      <stop offset="50%" stop-color="#EDE8E1"/>
      <stop offset="100%" stop-color="#E5E0D8"/>
    </linearGradient>

    <!-- Gold accent gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C9A962"/>
      <stop offset="50%" stop-color="#D4B96A"/>
      <stop offset="100%" stop-color="#B8944D"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle shadow -->
    <filter id="subtleShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#2C2C2C" flood-opacity="0.08"/>
    </filter>

    <!-- Inner glow for hands -->
    <filter id="handGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="20" fill="url(#bgGrad)"/>

  <!-- Subtle border -->
  <rect x="1" y="1" width="398" height="398" rx="20" fill="none" stroke="#D4CFC6" stroke-width="1"/>

  <!-- Outer glow ring - representing aura/merit -->
  <circle cx="200" cy="200" r="140" fill="none" stroke="url(#goldGrad)" stroke-width="0.5" opacity="0.4"/>
  <circle cx="200" cy="200" r="120" fill="none" stroke="url(#goldGrad)" stroke-width="0.3" opacity="0.3"/>

  <!-- Halo/Enso circle -->
  <circle cx="200" cy="200" r="80" fill="none" stroke="#D4B96A" stroke-width="1.5" opacity="0.5" filter="url(#softGlow)"/>

  <!-- Left Hand (mirrored) -->
  <g filter="url(#handGlow)">
    <path d="
      M 170 160
      Q 155 165 145 180
      Q 140 195 142 210
      Q 144 225 148 240
      Q 152 255 158 268
      Q 165 280 175 290
      Q 185 298 195 300
      L 200 300
      L 200 280
      Q 192 270 185 260
      Q 178 248 174 235
      Q 170 222 168 210
      Q 166 198 167 185
      Q 168 172 170 160
      Z
    " fill="#3D3D3D" opacity="0.85"/>

    <!-- Left thumb -->
    <path d="
      M 175 200
      Q 180 195 188 198
      Q 195 202 193 212
      Q 190 220 182 218
      Q 176 216 175 210
      Q 174 205 175 200
      Z
    " fill="#3D3D3D" opacity="0.85"/>
  </g>

  <!-- Right Hand -->
  <g filter="url(#handGlow)">
    <path d="
      M 230 160
      Q 245 165 255 180
      Q 260 195 258 210
      Q 256 225 252 240
      Q 248 255 242 268
      Q 235 280 225 290
      Q 215 298 205 300
      L 200 300
      L 200 280
      Q 208 270 215 260
      Q 222 248 226 235
      Q 230 222 232 210
      Q 234 198 233 185
      Q 232 172 230 160
      Z
    " fill="#3D3D3D" opacity="0.85"/>

    <!-- Right thumb -->
    <path d="
      M 225 200
      Q 220 195 212 198
      Q 205 202 207 212
      Q 210 220 218 218
      Q 224 216 225 210
      Q 226 205 225 200
      Z
    " fill="#3D3D3D" opacity="0.85"/>
  </g>

  <!-- Palm center glow -->
  <ellipse cx="200" cy="240" rx="15" ry="20" fill="#D4B96A" opacity="0.15"/>

  <!-- Light rays emanating -->
  <g opacity="0.3" stroke="url(#goldGrad)" stroke-width="0.5" stroke-linecap="round">
    <line x1="200" y1="100" x2="200" y2="85"/>
    <line x1="240" y1="115" x2="250" y2="100"/>
    <line x1="160" y1="115" x2="150" y2="100"/>
    <line x1="270" y1="145" x2="285" y2="135"/>
    <line x1="130" y1="145" x2="115" y2="135"/>
  </g>

  <!-- Subtle corner decorations -->
  <g opacity="0.2">
    <path d="M 30 30 Q 50 30 50 50" fill="none" stroke="#B8944D" stroke-width="0.5"/>
    <path d="M 370 30 Q 350 30 350 50" fill="none" stroke="#B8944D" stroke-width="0.5"/>
    <path d="M 30 370 Q 50 370 50 350" fill="none" stroke="#B8944D" stroke-width="0.5"/>
    <path d="M 370 370 Q 350 370 350 350" fill="none" stroke="#B8944D" stroke-width="0.5"/>
  </g>

  <!-- Merit counter -->
  <g filter="url(#subtleShadow)">
    <text x="200" y="355" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#4A4A4A" letter-spacing="4">
      +1
    </text>
    <text x="200" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#8A8A8A" letter-spacing="6" opacity="0.8">
      CÔNG čC
    </text>
  </g>
</svg>